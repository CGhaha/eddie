<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eddie's Management Center | V2.2 终极兼容版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 mt-10">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-900">
            <h1 class="text-xl font-bold text-white">Eddie's Management Center</h1>
            <span class="text-[10px] px-2 py-1 bg-blue-500 text-white rounded">V2.2 兼容版</span>
        </div>

        <form id="uploadForm" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700">Product Name 产品名称</label>
                <input type="text" id="name" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700">Material 材质</label>
                    <input type="text" id="material" class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700">MOQ 起订量</label>
                    <input type="text" id="moq" class="w-full px-4 py-2 border rounded-lg">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700">Category 分类</label>
                <select id="category" class="w-full px-4 py-2 border rounded-lg bg-white">
                    <option value="hot-sales">Hot Sales 热销商品</option>
                    <option value="videos">Videos 视频</option>
                    <option value="showroom-3d">3D Showroom 3D 展厅</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700">Upload File (图片或 GLB)</label>
                <input type="file" id="file" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700">YouTube URL</label>
                <input type="url" id="yt_url" placeholder="https://..." class="w-full px-4 py-2 border rounded-lg">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">
                <span id="btnText">🚀 SAVE & SYNC TO CLOUD</span>
            </button>
        </form>

        <div id="status" class="px-6 pb-6 hidden">
            <div id="statusContent" class="p-4 rounded-xl text-sm font-medium border"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://mamba-api.mfgift.workers.dev/api/upload';

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const statusDiv = document.getElementById('status');
            const statusContent = document.getElementById('statusContent');
            const fileInput = document.getElementById('file');

            // UI 锁定
            btn.disabled = true;
            btnText.innerText = "⏳ PROCESSING...";
            statusDiv.classList.remove('hidden');
            statusContent.className = "p-4 rounded-xl text-sm bg-blue-50 text-blue-700 border-blue-100";
            statusContent.innerHTML = "Reading file and connecting to Cloudflare...<br>正在读取文件并建立连接...";

            try {
                const file = fileInput.files[0];
                let fileData = null;
                let fileName = "";

                if (file) {
                    // 兼容性修正：安全获取文件名
                    fileName = file.name ? String(file.name) : "unknown_file";
                    
                    // 读取文件
                    fileData = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = () => reject(new Error("文件读取失败"));
                        reader.readAsDataURL(file);
                    });
                }

                const payload = {
                    name: document.getElementById('name').value,
                    material: document.getElementById('material').value,
                    moq: document.getElementById('moq').value,
                    category: document.getElementById('category').value,
                    yt_url: document.getElementById('yt_url').value,
                    fileName: fileName,
                    fileData: fileData
                };

                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error || `Server Error (${res.status})`);
                }

                statusContent.className = "p-4 rounded-xl text-sm bg-green-50 text-green-700 border-green-100";
                statusContent.innerHTML = "✅ SYNC SUCCESS!<br>同步成功！请等待 GitHub 部署（约 1 分钟）。";
                document.getElementById('uploadForm').reset();

            } catch (err) {
                statusContent.className = "p-4 rounded-xl text-sm bg-red-50 text-red-700 border-red-100";
                statusContent.innerHTML = "❌ ERROR: " + err.message + "<br>建议：检查网络或确认 GitHub 上的 assets 文件已删除。";
            } finally {
                btn.disabled = false;
                btnText.innerText = "🚀 SAVE & SYNC TO CLOUD";
            }
        };
    </script>
</body>
</html>
