<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamba Admin | V2.1 多选增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1 bg-white rounded-2xl shadow-xl border border-slate-100 p-6 h-fit sticky top-6">
            <h1 id="formTitle" class="text-xl font-bold mb-4">Add Product</h1>
            <form id="uploadForm" class="space-y-4" onsubmit="return false;">
                <input type="hidden" id="editId">
                <input type="hidden" id="existingPath">
                
                <input type="text" id="name" placeholder="Product Name" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="material" placeholder="Material" class="w-full px-4 py-2 border rounded-lg">
                    <input type="text" id="moq" placeholder="MOQ" class="w-full px-4 py-2 border rounded-lg">
                </div>

                <select id="category" class="w-full px-4 py-2 border rounded-lg bg-white">
                    <option value="hot-sales">Hot Sales (Home)</option>
                    <option value="videos">Videos Section</option>
                    <option value="showroom-3d">3D Showroom</option>
                </select>

                <input type="text" id="yt_url" placeholder="YouTube URL (Optional)" class="w-full px-4 py-2 border rounded-lg">

                <div class="p-3 bg-gray-50 rounded-lg">
                    <p class="text-xs font-bold mb-2 text-gray-500 uppercase">Category Tags</p>
                    <div class="grid grid-cols-2 gap-1 text-[10px]" id="tagGroup">
                        </div>
                </div>

                <div class="border-2 border-dashed border-slate-200 rounded-lg p-4 text-center">
                    <input type="file" id="file" class="text-xs w-full" multiple>
                    <p class="text-[10px] text-gray-400 mt-2 text-left leading-tight">Note: Current system saves the first file to cloud by default.</p>
                </div>

                <button id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">SAVE TO CLOUD</button>
                <div id="status" class="hidden p-3 rounded-lg text-xs font-medium"></div>
            </form>
        </div>

        <div class="md:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Product</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Category</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="list" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://mamba-api.mfgift.workers.dev/api';
        const CATEGORIES = ["Apparel", "Bags", "Trade Show", "Caps", "Outdoor & Leisure", "Technology", "Mugs & Drinkware", "Bar", "Automotive", "Home & Kitchen", "Wellness & Health", "Sports", "Offices & Desks", "Jewelry & Giveaways", "Toys & Fun"];

        // 初始化标签
        const tagGroup = document.getElementById('tagGroup');
        tagGroup.innerHTML = CATEGORIES.map(c => `
            <label class="flex items-center gap-1 hover:bg-white p-1 rounded cursor-pointer">
                <input type="checkbox" name="tag" value="${c}"> ${c}
            </label>
        `).join('');

        async function load() {
            const res = await fetch(`${API_BASE}/products`);
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = data.map(p => `
                <tr class="hover:bg-slate-50/50 transition">
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <img src="${p.file_path || ''}" class="w-10 h-10 rounded shadow-sm object-cover bg-gray-100" onerror="this.src='https://placehold.co/40x40?text=No+Img'">
                            <span class="font-medium text-slate-700 text-sm">${p.name}</span>
                        </div>
                    </td>
                    <td class="p-4"><span class="px-2 py-1 bg-slate-100 rounded text-[10px] text-slate-500 font-bold uppercase">${p.category}</span></td>
                    <td class="p-4 text-right">
                        <button onclick='edit(${JSON.stringify(p)})' class="text-blue-600 hover:bg-blue-50 px-3 py-1 rounded text-xs font-bold">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function edit(p) {
            document.getElementById('formTitle').innerText = "Edit Product";
            document.getElementById('editId').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('material').value = p.material || '';
            document.getElementById('moq').value = p.moq || '';
            document.getElementById('category').value = p.category;
            document.getElementById('yt_url').value = p.yt_url || '';
            document.getElementById('existingPath').value = p.file_path || '';
            
            const tags = p.tags ? p.tags.split(',') : [];
            document.querySelectorAll('input[name="tag"]').forEach(ck => {
                ck.checked = tags.includes(ck.value);
            });
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('formTitle').innerText = "Add Product";
            document.getElementById('uploadForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('existingPath').value = '';
        }

        document.getElementById('submitBtn').onclick = async () => {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
            status.classList.add('bg-blue-50', 'text-blue-700');
            
            try {
                // Step 1: 读取本地文件 (默认取第一个文件以保持 V2.1 逻辑稳定)
                status.innerHTML = "Step 1: Reading file...";
                const files = document.getElementById('file').files;
                let fileData = null;
                let fileName = "no_file";

                if (files.length > 0) {
                    const file = files[0];
                    fileName = file.name;
                    fileData = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = () => r(reader.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    });
                }

                // Step 2: 发送请求
                status.innerHTML = "Step 2: Syncing to cloud...";
                const payload = {
                    id: document.getElementById('editId').value,
                    name: document.getElementById('name').value,
                    material: document.getElementById('material').value,
                    moq: document.getElementById('moq').value,
                    category: document.getElementById('category').value,
                    yt_url: document.getElementById('yt_url').value,
                    existingPath: document.getElementById('existingPath').value,
                    tags: Array.from(document.querySelectorAll('input[name="tag"]:checked')).map(i=>i.value).join(','),
                    fileName: fileName,
                    fileData: fileData
                };

                const res = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();
                if (!res.ok) throw new Error(result.error || "Server Error");

                // Step 3: 完成
                status.innerHTML = "✅ Success! All data synced.";
                status.classList.replace('bg-blue-50', 'bg-green-50');
                status.classList.replace('text-blue-700', 'text-green-700');
                
                resetForm(); load();
            } catch (err) {
                status.innerHTML = `❌ Failed!<br>${err.message}`;
                status.classList.replace('bg-blue-50', 'bg-red-50');
                status.classList.replace('text-blue-700', 'text-red-700');
            } finally {
                btn.disabled = false;
            }
        };

        load();
    </script>
</body>
</html>
