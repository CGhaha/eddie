<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Center V2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-10 px-4">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden mb-8 border border-gray-100">
            <div class="bg-slate-900 p-6 flex justify-between items-center">
                <h1 class="text-white text-xl font-bold">Mamba Promo Management</h1>
                <span class="bg-blue-500 text-white text-[10px] px-2 py-1 rounded font-black uppercase">System V2.5</span>
            </div>

            <form id="uploadForm" class="p-8 space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Product Name 产品名称</label>
                        <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Display Page 展示页面</label>
                        <select id="category" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none">
                            <option value="hot-sales">Hot Sales 热销商品</option>
                            <option value="videos">Videos 产品视频</option>
                            <option value="3d-view">3D Showroom 虚拟展厅</option>
                        </select>
                    </div>
                </div>

                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Sub-Categories 细分标签</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" name="tags" value="Apparel"> Apparel</label>
                        <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" name="tags" value="Drinkware"> Drinkware</label>
                        <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" name="tags" value="Bags"> Bags</label>
                        <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" name="tags" value="Office"> Office</label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Material 材质</label><input type="text" id="material" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none"></div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">MOQ 起订量</label><input type="text" id="moq" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none"></div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Upload Asset (Image/GLB)</label>
                    <input type="file" id="fileInput" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">YouTube URL (Optional)</label>
                    <input type="url" id="yt_url" placeholder="https://www.youtube.com/watch?v=..." class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition uppercase tracking-widest">
                    <span>🚀 Sync to Cloud & Website</span>
                </button>
            </form>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-lg font-bold">Inventory List</h2>
                <button onclick="loadProducts()" class="text-blue-500 text-xs">Refresh</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <tbody id="productList" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://mamba-api.mfgift.workers.dev/api/products';

        async function loadProducts() {
            const container = document.getElementById('productList');
            try {
                const res = await fetch(API_URL);
                const products = await res.json();
                container.innerHTML = products.map(p => `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4">
                            <p class="font-bold text-sm text-slate-800">${p.name}</p>
                            <p class="text-[10px] text-gray-400 uppercase">${p.category}</p>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteProduct(${p.id}, this)" class="text-red-500 font-bold text-[10px]">DELETE</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { container.innerHTML = "Sync Error."; }
        }

        async function deleteProduct(id, btn) {
            if (!confirm("Confirm delete?")) return;
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadProducts();
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = "⏳ SYNCING ASSETS...";

            try {
                const file = document.getElementById('fileInput').files[0];
                let filePayload = null;

                if (file) {
                    const reader = new FileReader();
                    filePayload = await new Promise(resolve => {
                        reader.onload = () => resolve({ name: file.name, content: reader.result.split(',')[1] });
                        reader.readAsDataURL(file);
                    });
                }

                const tags = Array.from(document.querySelectorAll('input[name="tags"]:checked')).map(c => c.value);
                const categoryValue = [document.getElementById('category').value, ...tags].join(', ');

                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        material: document.getElementById('material').value,
                        moq: document.getElementById('moq').value,
                        category: categoryValue,
                        yt_url: document.getElementById('yt_url').value,
                        file: filePayload
                    })
                });

                const result = await res.json();
                if (!res.ok || !result.success) throw new Error(result.message);

                alert("SYNC SUCCESSFUL!");
                document.getElementById('uploadForm').reset();
                loadProducts();
            } catch (err) {
                alert("CRITICAL ERROR: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "🚀 Sync to Cloud & Website";
            }
        };

        loadProducts();
    </script>
</body>
</html>
