<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eddie's Management Center | V2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        /* 强制表格和按钮不换行 */
        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-10 px-4">

    <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden mb-8 border border-gray-100">
            <div class="bg-slate-900 p-6 flex justify-between items-center">
                <h1 class="text-white text-xl font-bold tracking-tight">Mamba Promo Management</h1>
                <span class="bg-blue-500 text-white text-[10px] px-2 py-1 rounded font-black uppercase">System V2.5</span>
            </div>

            <form id="uploadForm" class="p-8 space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Product Name 产品名称</label>
                        <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Category 分类</label>
                        <select id="category" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none">
                            <option value="hot-sales">Hot Sales 热销商品</option>
                            <option value="videos">Videos 产品视频</option>
                            <option value="showroom-3d">3D Showroom 虚拟展厅</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Material 材质</label>
                        <input type="text" id="material" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">MOQ 起订量</label>
                        <input type="text" id="moq" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Upload Assets (Image/GLB)</label>
                    <input type="file" id="fileInput" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">YouTube Video URL (Optional)</label>
                    <input type="url" id="yt_url" placeholder="https://www.youtube.com/watch?v=..." class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition duration-300 flex items-center justify-center gap-2 uppercase tracking-widest">
                    <span>🚀 Sync to Cloud & Website</span>
                </button>
            </form>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-800">Inventory List 库存管理</h2>
                <button onclick="loadProducts()" class="text-blue-500 text-xs hover:underline">Refresh 刷新</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4 font-bold text-gray-600">Product Info</th>
                            <th class="px-6 py-4 font-bold text-gray-600">Category</th>
                            <th class="px-6 py-4 font-bold text-gray-600 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="productList" class="divide-y divide-gray-50">
                        <tr><td colspan="3" class="px-6 py-8 loading-shimmer"></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://mamba-api.mfgift.workers.dev/api/products';
        const GITHUB_API = 'https://api.github.com/repos/CGhaha/eddie/contents/assets/';
        const TOKEN = 'YOUR_GITHUB_TOKEN'; // 必须替换为你真实的 Token

        // 1. 加载并渲染产品列表
        async function loadProducts() {
            const container = document.getElementById('productList');
            try {
                const res = await fetch(API_URL);
                const products = await res.json();
                
                if (products.length === 0) {
                    container.innerHTML = `<tr><td colspan="3" class="px-6 py-10 text-center text-gray-400">No products in database.</td></tr>`;
                    return;
                }

                container.innerHTML = products.map(p => `
                    <tr class="hover:bg-blue-50/30 transition">
                        <td class="px-6 py-4">
                            <p class="font-bold text-slate-800 text-sm">${p.name}</p>
                            <p class="text-[10px] text-slate-400">MOQ: ${p.moq || 'N/A'}</p>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 bg-gray-100 text-gray-500 text-[10px] rounded-md font-bold uppercase">${p.category}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteProduct(${p.id}, this)" 
                                class="bg-red-50 text-red-500 px-4 py-2 rounded-lg text-[10px] font-black hover:bg-red-500 hover:text-white transition duration-200 delete-btn">
                                DELETE
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                container.innerHTML = `<tr><td colspan="3" class="px-6 py-10 text-center text-red-400 font-bold">Failed to sync database.</td></tr>`;
            }
        }

        // 2. 修复后的删除功能（支持连续点击）
        async function deleteProduct(id, btnElement) {
            if (!confirm("Confirm to delete? This will remove it from the website.")) return;
            
            // 锁定当前按钮状态
            const originalText = btnElement.innerText;
            btnElement.disabled = true;
            btnElement.innerText = "WAIT...";
            btnElement.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const res = await fetch(`${API_URL}/${id}`, { 
                    method: 'DELETE',
                    mode: 'cors'
                });
                
                const result = await res.json();
                
                if (res.ok && result.success) {
                    // 删除成功，直接从 DOM 中移除这一行（用户体验更好）
                    btnElement.closest('tr').style.opacity = '0';
                    setTimeout(() => {
                        loadProducts(); // 重新加载列表同步状态
                    }, 400);
                } else {
                    throw new Error(result.message || "Server Error");
                }
            } catch (err) {
                console.error("Delete Error:", err);
                alert("Error: " + err.message);
                // 恢复按钮状态
                btnElement.disabled = false;
                btnElement.innerText = originalText;
                btnElement.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // 3. 上传表单逻辑
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<span>⏳ SYNCING ASSETS...</span>`;

            try {
                const file = document.getElementById('fileInput').files[0];
                let filePath = "";

                // 如果有文件，先传 GitHub
                if (file) {
                    const reader = new FileReader();
                    const base64Promise = new Promise(resolve => {
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    });
                    const content = await base64Promise;
                    const fileName = Date.now() + "-" + file.name;

                    const ghRes = await fetch(GITHUB_API + fileName, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `admin_upload ${fileName}`, content })
                    });
                    if (!ghRes.ok) throw new Error("GitHub logic failed. Check Token.");
                    filePath = "assets/" + fileName;
                }

                // 同步到 Workers 数据库
                const productData = {
                    name: document.getElementById('name').value,
                    material: document.getElementById('material').value,
                    moq: document.getElementById('moq').value,
                    category: document.getElementById('category').value,
                    file_path: filePath,
                    yt_url: document.getElementById('yt_url').value
                };

                const dbRes = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });

                if (!dbRes.ok) throw new Error("Database sync failed.");

                alert("SYNC SUCCESSFUL!");
                document.getElementById('uploadForm').reset();
                loadProducts();
            } catch (err) {
                alert("CRITICAL ERROR: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>🚀 SAVE & SYNC TO CLOUD</span>`;
            }
        };

        // 页面初始化加载
        loadProducts();
    </script>
</body>
</html>
