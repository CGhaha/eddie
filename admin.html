<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamba Admin | Multi-Upload & Pagination</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .thumb-preview {
            position: relative;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .thumb-preview.is-first {
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
        }
        .first-badge {
            position: absolute;
            top: -4px;
            left: -4px;
            background: #2563eb;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 4px;
            z-index: 10;
            font-weight: bold;
        }
        .delete-thumb {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            z-index: 11;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6 text-sm">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1 bg-white rounded-2xl shadow-xl border border-slate-100 p-6 h-fit sticky top-6">
            <h1 id="formTitle" class="text-xl font-bold mb-4">Add Product</h1>
            <form id="uploadForm" class="space-y-4" onsubmit="return false;">
                <input type="hidden" id="editId">
                <input type="text" id="name" placeholder="Product Name" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="material" placeholder="Material" class="px-4 py-2 border rounded-lg">
                    <input type="text" id="moq" placeholder="MOQ" class="px-4 py-2 border rounded-lg">
                </div>
                <select id="category" class="w-full px-4 py-2 border rounded-lg bg-white">
                    <option value="hot-sales">Hot Sales (Home)</option>
                    <option value="videos">Videos Section</option>
                    <option value="showroom-3d">3D Showroom</option>
                </select>
                <input type="text" id="yt_url" placeholder="YouTube URL (Optional)" class="w-full px-4 py-2 border rounded-lg">
                
                <textarea id="description" placeholder="Product Description (Optional)" rows="3" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500"></textarea>

                <div class="p-3 bg-gray-50 rounded-lg">
                    <p class="text-[10px] font-bold mb-2 text-gray-500 uppercase">Category Tags</p>
                    <div class="grid grid-cols-2 gap-1 text-[10px]" id="tagGroup"></div>
                </div>

                <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-lg p-4 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors">
                    <input type="file" id="file" class="hidden" multiple>
                    <p class="text-gray-400">Click to Select or Drop Multi-Files</p>
                    <div id="thumbContainer" class="flex flex-wrap gap-3 mt-4 justify-center"></div>
                </div>

                <button id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">SAVE TO CLOUD</button>
                <div id="status" class="hidden p-3 rounded-lg text-xs font-medium"></div>
            </form>
        </div>

        <div class="md:col-span-2">
            <div class="mb-4 flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <select id="filterCategory" onchange="currentPage=1; renderTable()" class="border rounded-lg px-3 py-1 outline-none">
                    <option value="all">All Categories</option>
                    <option value="hot-sales">Hot Sales</option>
                    <option value="videos">Videos</option>
                    <option value="showroom-3d">3D Showroom</option>
                </select>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-4 text-xs font-bold text-slate-500">PRODUCT</th>
                            <th class="p-4 text-xs font-bold text-slate-500 text-right">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="list" class="divide-y divide-slate-50"></tbody>
                </table>
                <div id="pagination" class="p-4 bg-slate-50 border-t flex justify-between items-center text-xs"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://mamba-api.mfgift.workers.dev/api';
        const CATEGORIES = ["Apparel", "Bags", "Trade Show", "Caps", "Outdoor & Leisure", "Technology", "Mugs & Drinkware", "Bar", "Automotive", "Home & Kitchen", "Wellness & Health", "Sports", "Offices & Desks", "Jewelry & Giveaways", "Toys & Fun"];
        
        let rawData = [], currentPage = 1, pageSize = 15;
        let uploadedFiles = []; 

        document.getElementById('tagGroup').innerHTML = CATEGORIES.map(c => `<label class="flex items-center gap-1"><input type="checkbox" name="tag" value="${c}"> ${c}</label>`).join('');

        const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('file');
        dropZone.onclick = (e) => { if(e.target === dropZone || e.target.tagName === 'P') fileInput.click(); };
        
        const handleFiles = async (files) => {
            for (let file of files) {
                const base64 = await new Promise(r => {
                    const rd = new FileReader(); 
                    rd.onload = () => r(rd.result.split(',')[1]); 
                    rd.readAsDataURL(file);
                });
                uploadedFiles.push({
                    name: file.name,
                    data: base64,
                    isExisting: false,
                    previewUrl: URL.createObjectURL(file)
                });
            }
            renderThumbs();
        };

        fileInput.onchange = () => handleFiles(fileInput.files);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-50'); };
        dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };

        function renderThumbs() {
            const container = document.getElementById('thumbContainer');
            container.innerHTML = uploadedFiles.map((file, index) => `
                <div class="thumb-preview w-16 h-16 rounded-lg overflow-hidden cursor-pointer ${index === 0 ? 'is-first' : 'opacity-60'}" onclick="setAsFirst(${index})">
                    ${index === 0 ? '<span class="first-badge">COVER</span>' : ''}
                    <div class="delete-thumb" onclick="event.stopPropagation(); removeThumb(${index})">×</div>
                    <img src="${file.previewUrl}" class="w-full h-full object-cover">
                </div>
            `).join('');
        }

        function setAsFirst(index) {
            if (index === 0) return;
            const item = uploadedFiles.splice(index, 1)[0];
            uploadedFiles.unshift(item);
            renderThumbs();
        }

        function removeThumb(index) {
            uploadedFiles.splice(index, 1);
            renderThumbs();
        }

        async function load() {
            const res = await fetch(`${API_BASE}/products`);
            rawData = await res.json();
            renderTable();
        }

        function renderTable() {
            const filter = document.getElementById('filterCategory').value;
            const filtered = filter === 'all' ? rawData : rawData.filter(p => p.category === filter);
            const totalPages = Math.ceil(filtered.length / pageSize) || 1;
            const data = filtered.slice((currentPage-1)*pageSize, currentPage*pageSize);

            document.getElementById('list').innerHTML = data.map(p => `
                <tr class="hover:bg-slate-50/50">
                    <td class="p-4 flex items-center gap-3">
                        <img src="${p.file_path.split(',')[0]}" class="w-10 h-10 rounded object-cover bg-gray-100" onerror="this.src='https://placehold.co/40x40?text=Img'">
                        <span class="font-medium">${p.name} ${p.file_path.includes(',') ? '<span class="text-blue-500 text-[10px]">(Multi)</span>' : ''}</span>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick='edit(${JSON.stringify(p)})' class="text-blue-600 font-bold mr-3">Edit</button>
                        <button onclick="delProduct(${p.id}, '${p.name}')" class="text-red-500 font-bold">Del</button>
                    </td>
                </tr>`).join('');

            document.getElementById('pagination').innerHTML = `
                <span>Total ${filtered.length} | Page ${currentPage}/${totalPages}</span>
                <div class="flex gap-2">
                    <button onclick="changePage(-1)" ${currentPage===1?'disabled':''} class="px-3 py-1 border rounded disabled:opacity-30">Prev</button>
                    <button onclick="changePage(1)" ${currentPage===totalPages?'disabled':''} class="px-3 py-1 border rounded disabled:opacity-30">Next</button>
                </div>`;
        }

        function changePage(dir) { currentPage += dir; renderTable(); }

        async function delProduct(id, name) {
            if (confirm(`Delete "${name}"?`)) {
                await fetch(`${API_BASE}/products`, { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id}) });
                load();
            }
        }

        function edit(p) {
            resetForm();
            document.getElementById('formTitle').innerText = "Edit Product";
            document.getElementById('editId').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('material').value = p.material || '';
            document.getElementById('moq').value = p.moq || '';
            document.getElementById('category').value = p.category;
            document.getElementById('yt_url').value = p.yt_url || '';
            
            // 【编辑回显描述】
            document.getElementById('description').value = p.description || '';
            
            if(p.file_path) {
                p.file_path.split(',').forEach(path => {
                    uploadedFiles.push({
                        name: path.split('/').pop(),
                        data: null, 
                        isExisting: true,
                        previewUrl: path
                    });
                });
            }
            renderThumbs();
            const tags = p.tags ? p.tags.split(',') : [];
            document.querySelectorAll('input[name="tag"]').forEach(ck => ck.checked = tags.includes(ck.value));
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('uploadForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('formTitle').innerText = "Add Product";
            uploadedFiles = [];
            document.getElementById('thumbContainer').innerHTML = "";
        }

        document.getElementById('submitBtn').onclick = async () => {
            const btn = document.getElementById('submitBtn'), status = document.getElementById('status');
            btn.disabled = true; 
            status.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
            status.classList.add('bg-blue-50', 'text-blue-700');
            
            try {
                status.innerHTML = "Step 1: Processing files...";
                
                let existingPaths = [];
                let newNames = [];
                let newData = [];

                uploadedFiles.forEach(file => {
                    if(file.isExisting) {
                        existingPaths.push(file.previewUrl);
                    } else {
                        newNames.push(file.name);
                        newData.push(file.data);
                    }
                });

                const payload = {
                    id: document.getElementById('editId').value,
                    name: document.getElementById('name').value,
                    material: document.getElementById('material').value,
                    moq: document.getElementById('moq').value,
                    category: document.getElementById('category').value,
                    yt_url: document.getElementById('yt_url').value,
                    
                    // 【将描述加入上传负荷】
                    description: document.getElementById('description').value,
                    
                    existingPath: existingPaths.join(','), 
                    tags: Array.from(document.querySelectorAll('input[name="tag"]:checked')).map(i=>i.value).join(','),
                    fileName: newNames.length > 0 ? newNames.join('|') : "no_file", 
                    fileData: newData.length > 0 ? newData.join('|') : ""
                };

                const res = await fetch(`${API_BASE}/upload`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(payload) 
                });

                if (res.ok) { 
                    status.innerHTML = "✅ Success! All data synced."; 
                    status.classList.replace('bg-blue-50', 'bg-green-50');
                    resetForm(); 
                    load(); 
                } else { throw new Error("Upload failed"); }
            } catch (err) { 
                status.innerHTML = "❌ Error: " + err.message; 
                status.classList.replace('bg-blue-50', 'bg-red-50');
            } finally { btn.disabled = false; }
        };

        load();
    </script>
</body>
</html>
