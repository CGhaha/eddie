<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mamba Admin | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 border-b pb-2">Eddie's Management Center</h1>
        
        <!-- 分类选择 -->
        <div class="flex gap-4 mb-8">
            <button onclick="switchTab('hot-sales')" class="tab-btn bg-blue-600 text-white px-4 py-2 rounded">Hot Sales</button>
            <button onclick="switchTab('videos')" class="tab-btn bg-gray-200 px-4 py-2 rounded">Videos</button>
            <button onclick="switchTab('showroom-3d')" class="tab-btn bg-gray-200 px-4 py-2 rounded">3D Showroom</button>
        </div>

        <form id="uploadForm" class="space-y-4">
            <input type="hidden" id="category" value="hot-sales">
            
            <div>
                <label class="block font-medium">Product Name</label>
                <input type="text" id="name" class="w-full border p-2 rounded" required>
            </div>

            <div id="info-fields" class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block font-medium">Material</label>
                    <input type="text" id="material" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block font-medium">MOQ</label>
                    <input type="text" id="moq" class="w-full border p-2 rounded">
                </div>
            </div>

            <div id="media-fields">
                <label class="block font-medium">Upload File (Image/GLB)</label>
                <input type="file" id="mainFile" class="w-full border p-2 rounded">
                <p class="text-xs text-gray-400 mt-1">* Hot Sales/3D: Upload Images or GLB files.</p>
            </div>

            <div>
                <label class="block font-medium">YouTube URL (Video Link)</label>
                <input type="url" id="yt_url" placeholder="https://youtube.com/..." class="w-full border p-2 rounded">
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">🚀 SAVE & SYNC TO CLOUD</button>
        </form>
    </div>

    <script>
        function switchTab(cat) {
            document.getElementById('category').value = cat;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('bg-gray-200');
            });
            event.target.classList.add('bg-blue-600', 'text-white');
            
            // 针对3D模式隐藏部分字段
            const infoFields = document.getElementById('info-fields');
            infoFields.style.display = (cat === 'showroom-3d') ? 'none' : 'grid';
        }

        // 这里集成之前的 GitHub 上传逻辑和 API 提交逻辑即可...
    </script>
</body>
</html>
