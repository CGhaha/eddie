<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mamba Admin | Eddie's Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <div class="flex justify-between items-center mb-6 border-b pb-2">
            <h1 class="text-2xl font-bold text-slate-800">Eddie's Management Center</h1>
            <span class="text-sm bg-green-100 text-green-700 px-2 py-1 rounded">V2.0 安全版</span>
        </div>
        
        <div class="flex gap-4 mb-8">
            <button type="button" onclick="switchTab('hot-sales')" id="btn-hot" class="tab-btn bg-blue-600 text-white px-4 py-2 rounded shadow">Hot Sales</button>
            <button type="button" onclick="switchTab('videos')" id="btn-vid" class="tab-btn bg-gray-200 px-4 py-2 rounded">Videos</button>
            <button type="button" onclick="switchTab('showroom-3d')" id="btn-3d" class="tab-btn bg-gray-200 px-4 py-2 rounded">3D Showroom</button>
        </div>

        <form id="uploadForm" class="space-y-4">
            <input type="hidden" id="category" value="hot-sales">
            
            <div>
                <label class="block font-bold text-sm text-gray-700">Product Name 产品名称</label>
                <input type="text" id="name" placeholder="例如: Custom Stress Ball" class="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <div id="info-fields" class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block font-bold text-sm text-gray-700">Material 材质</label>
                    <input type="text" id="material" placeholder="PU / Plastic" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block font-bold text-sm text-gray-700">MOQ 起订量</label>
                    <input type="text" id="moq" placeholder="1000" class="w-full border p-2 rounded">
                </div>
            </div>

            <div id="file-selector">
                <label class="block font-bold text-sm text-gray-700">Upload File 上传文件 (图片或GLB)</label>
                <input type="file" id="mainFile" class="w-full border p-2 rounded bg-gray-50 cursor-pointer">
            </div>

            <div>
                <label class="block font-bold text-sm text-gray-700">YouTube URL (视频链接)</label>
                <input type="url" id="yt_url" placeholder="https://youtube.com/watch?v=..." class="w-full border p-2 rounded">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-4 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg active:scale-95 mt-6">
                🚀 SAVE & SYNC TO CLOUD
            </button>
        </form>
        
        <div id="statusBox" class="mt-6 p-4 rounded text-center font-bold hidden border"></div>
    </div>

    <script>
        // 这是你的 Cloudflare Worker 地址
        const API_BASE = 'https://mamba-api.mfgift.workers.dev/api/upload';

        function switchTab(cat) {
            document.getElementById('category').value = cat;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'shadow');
                b.classList.add('bg-gray-200');
            });
            const activeBtn = document.getElementById(cat === 'hot-sales' ? 'btn-hot' : (cat === 'videos' ? 'btn-vid' : 'btn-3d'));
            activeBtn.classList.add('bg-blue-600', 'text-white', 'shadow');
            document.getElementById('info-fields').style.display = (cat === 'showroom-3d') ? 'none' : 'grid';
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusBox');
            const fileInput = document.getElementById('mainFile');
            
            btn.disabled = true;
            btn.innerText = "⏳ 正在同步到云端...";
            status.classList.remove('hidden');
            status.innerText = "正在读取文件并提交...";
            status.className = "mt-6 p-4 bg-blue-50 text-blue-700 border-blue-200 rounded text-center font-bold";

            try {
                let fileBase64 = "";
                let fileName = "";
                
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    fileName = file.name;
                    fileBase64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                }

                const payload = {
                    name: document.getElementById('name').value,
                    material: document.getElementById('material').value,
                    moq: document.getElementById('moq').value,
                    category: document.getElementById('category').value,
                    yt_url: document.getElementById('yt_url').value,
                    file_content: fileBase64,
                    file_name: fileName
                };

                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    status.innerText = "✅ 同步成功！产品已录入数据库。";
                    status.className = "mt-6 p-4 bg-green-50 text-green-700 border-green-200 rounded text-center font-bold";
                    e.target.reset();
                } else {
                    const err = await res.json();
                    throw new Error(err.error || '服务器响应错误');
                }
            } catch (err) {
                console.error(err);
                status.innerText = "❌ 失败: " + err.message;
                status.className = "mt-6 p-4 bg-red-50 text-red-700 border-red-200 rounded text-center font-bold";
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 SAVE & SYNC TO CLOUD";
            }
        };
    </script>
</body>
</html>
