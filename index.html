<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MFM TEAM | SAGE A+ Supplier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .model-card model-viewer {
            width: 100%;
            height: 180px;
            --poster-color: transparent;
            background-color: #f8fafc;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .sidebar-item.active { background-color: #2563eb; color: white; }
        #modal-content {
            max-height: calc(100vh - 40px);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-center gap-4 md:gap-8 shadow-lg overflow-x-auto whitespace-nowrap">
        <button onclick="showPage('home')" class="hover:text-blue-400 font-medium transition">Home</button>
        <button onclick="showPage('hot-sales')" class="hover:text-blue-400 font-medium transition">Hot Sales</button>
        <button onclick="showPage('videos')" class="hover:text-blue-400 font-medium transition">Videos</button>
        <button onclick="showPage('3d-view')" class="hover:text-blue-400 font-medium transition">3D Showroom</button>
    </nav>

    <div id="home" class="page active">
        <div class="h-[60vh] flex flex-col justify-center items-center bg-gradient-to-br from-indigo-900 via-blue-800 to-blue-600 text-white text-center px-4">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 italic tracking-tight">MFM TEAM</h1>
            <p class="text-lg md:text-xl opacity-90 max-w-2xl">Premium SAGE A+ Supplier. Professional Custom Solutions for US Distributors.</p>
            <button onclick="showPage('hot-sales')" class="mt-8 bg-white text-blue-900 px-8 py-3 rounded-full font-bold hover:bg-blue-50 transition shadow-lg">View Our Catalog</button>
        </div>
    </div>

    <div id="main-content" class="max-w-[1920px] mx-auto py-12 px-4 md:px-10">
        <div class="flex flex-col md:flex-row gap-8">
            <aside id="category-sidebar" class="w-full md:w-64 flex-shrink-0 hidden">
                <div class="sticky top-24">
                    <h3 class="font-bold text-slate-900 mb-4 pb-2 border-b uppercase text-xs tracking-widest">Categories</h3>
                    <div id="tag-list" class="flex flex-wrap md:flex-col gap-1">
                        <button onclick="filterByTag('All')" class="sidebar-item active px-3 py-2 rounded-lg text-left text-sm font-medium hover:bg-gray-100 transition">All Items</button>
                    </div>
                </div>
            </aside>

            <div class="flex-1">
                <div id="hot-sales" class="page"><div class="flex justify-between items-center mb-8 border-b pb-4"><h2 class="text-3xl font-bold">Hot Sales</h2><input type="text" oninput="searchItems(this.value)" placeholder="Search..." class="px-4 py-2 border rounded-full text-sm"></div><div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="product-list"></div></div>
                <div id="videos" class="page"><div class="flex justify-between items-center mb-8 border-b pb-4"><h2 class="text-3xl font-bold">Videos</h2><input type="text" oninput="searchItems(this.value)" placeholder="Search..." class="px-4 py-2 border rounded-full text-sm"></div><div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-8" id="video-list"></div></div>
                <div id="3d-view" class="page"><div class="flex justify-between items-center mb-8 border-b pb-4"><h2 class="text-3xl font-bold">3D Showroom</h2><input type="text" oninput="searchItems(this.value)" placeholder="Search..." class="px-4 py-2 border rounded-full text-sm"></div><div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="3d-list"></div></div>
            </div>
        </div>
    </div>

    <div id="media-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-center justify-center p-2 md:p-6">
        <button onclick="closeModal()" class="absolute top-4 right-4 z-[70] text-white text-3xl md:text-5xl hover:text-gray-300">&times;</button>
        
        <div id="modal-content" class="w-full max-w-5xl max-h-full flex flex-col items-center overflow-y-auto">
            <div class="w-full aspect-video bg-gray-900 rounded-xl flex items-center justify-center overflow-hidden relative shadow-2xl flex-shrink-1">
                <iframe id="youtube-frame" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen class="hidden"></iframe>
                <img id="modal-img" src="" class="max-h-full max-w-full object-contain hidden">
                <div id="modal-3d-container" class="hidden w-full h-full"></div>
            </div>

            <div class="py-4 md:py-8 text-white text-center w-full px-4 shrink-0">
                <h2 id="modal-title" class="text-xl md:text-3xl font-bold"></h2>
                <p id="modal-desc" class="opacity-70 mt-1 md:mt-2 text-xs md:text-sm"></p>
                <div class="mt-4 md:mt-8 flex flex-wrap justify-center gap-3 md:gap-4 pb-4">
                    <button id="inquiry-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 md:px-10 py-2 md:py-4 rounded-full font-black uppercase tracking-widest transition shadow-xl text-sm md:text-base">Inquiry</button>
                    <button id="whatsapp-btn" class="bg-green-500 hover:bg-green-600 text-white px-6 md:px-10 py-2 md:py-4 rounded-full font-black uppercase tracking-widest transition shadow-xl text-sm md:text-base">WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://mamba-api.mfgift.workers.dev/api/products';
        let allProducts = [];
        let currentTag = 'All';
        let currentSearch = '';
        let currentPage = 'home';

        const CATEGORIES = ["Apparel", "Bags", "Trade Show", "Caps", "Outdoor & Leisure", "Technology", "Mugs & Drinkware", "Bar", "Automotive", "Home & Kitchen", "Wellness & Health", "Sports", "Offices & Desks", "Jewelry & Giveaways", "Toys & Fun"];

        function fixUrl(path) {
            if (!path) return '';
            if (path.startsWith('http')) return path;
            return `https://cdn.jsdelivr.net/gh/CGhaha/eddie@main/${path.replace(/^\//, '')}`;
        }

        async function init() {
            try {
                const res = await fetch(API);
                allProducts = await res.json();
                renderTags();
                
                // 核心修改：检测 URL 里的页面和产品ID
                handleDeepLink();
                
                setupButtons();
            } catch (e) { console.error(e); }
        }

        function handleDeepLink() {
            const fullHash = window.location.hash.replace('#', '');
            const [pageId, productId] = fullHash.split('!');
            
            // 切换到对应页面
            if (pageId && ['home', 'hot-sales', 'videos', '3d-view'].includes(pageId)) {
                showPage(pageId);
            } else {
                renderAll();
            }

            // 如果有产品ID，自动弹开
            if (productId) {
                const p = allProducts.find(x => x.id == productId);
                if (p) {
                    let type = 'img';
                    if(p.category === 'videos') type = 'video';
                    if(p.category === 'showroom-3d') type = '3d';
                    openModal(type, p.id, true); // true 表示是由 URL 触发的，不重复写 Hash
                }
            }
        }

        window.addEventListener('hashchange', () => {
            handleDeepLink();
        });

        function setupButtons() {
            document.getElementById('inquiry-btn').onclick = () => {
                const title = document.getElementById('modal-title').innerText;
                window.location.href = `mailto:zhanglonghaha001@gmail.com?subject=Inquiry: ${title}&body=Hi Eddie, I'm interested in this product: ${title}. Please provide more details.`;
            };
            document.getElementById('whatsapp-btn').onclick = () => {
                const title = document.getElementById('modal-title').innerText;
                const msg = encodeURIComponent(`Hi Eddie, I'm interested in: ${title}`);
                window.open(`https://wa.me/8613323604265?text=${msg}`, '_blank');
            };
        }

        function renderTags() {
            const tagContainer = document.getElementById('tag-list');
            if(!tagContainer) return;
            const allBtn = tagContainer.firstElementChild.outerHTML;
            tagContainer.innerHTML = allBtn + CATEGORIES.map(cat => `
                <button onclick="filterByTag('${cat}')" class="sidebar-item px-3 py-2 rounded-lg text-left text-sm font-medium hover:bg-gray-100 transition">${cat}</button>
            `).join('');
        }

        function showPage(id) {
            currentPage = id;
            // 仅在手动切换页面且弹窗关闭时更新 Hash
            if (!document.getElementById('media-modal').classList.contains('hidden')) {
                // 如果弹窗开着，保持 ID
            } else {
                window.location.hash = id;
            }
            
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            document.getElementById('category-sidebar').style.display = (id === 'home') ? 'none' : 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderAll();
        }

        function filterByTag(tag) {
            currentTag = tag;
            document.querySelectorAll('.sidebar-item').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === tag || (tag === 'All' && btn.innerText === 'All Items'));
            });
            renderAll();
        }

        function searchItems(val) {
            currentSearch = val.toLowerCase();
            renderAll();
        }

        function renderAll() {
            if(currentPage === 'home') return;
            let items = allProducts;
            if (currentPage === 'hot-sales') items = items.filter(p => p.category === 'hot-sales');
            if (currentPage === 'videos') items = items.filter(p => p.category === 'videos');
            if (currentPage === '3d-view') items = items.filter(p => p.category === 'showroom-3d');
            if (currentTag !== 'All') items = items.filter(p => p.tags && p.tags.includes(currentTag));
            if (currentSearch) items = items.filter(p => p.name.toLowerCase().includes(currentSearch));

            if (currentPage === 'hot-sales') renderGrid('product-list', items, 'img');
            if (currentPage === 'videos') renderGrid('video-list', items, 'video');
            if (currentPage === '3d-view') renderGrid('3d-list', items, '3d');
        }

        function renderGrid(containerId, items, type) {
            const grid = document.getElementById(containerId);
            if (!grid) return;
            grid.innerHTML = items.map(p => {
                if (type === 'img') {
                    return `<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 cursor-pointer group" onclick="openModal('img', ${p.id})">
                        <div class="aspect-square bg-white rounded-lg mb-3 overflow-hidden flex items-center justify-center">
                            <img src="${fixUrl(p.file_path)}" class="w-full h-full object-contain group-hover:scale-105 transition" loading="lazy">
                        </div>
                        <h3 class="font-bold text-gray-900 truncate text-sm">${p.name}</h3>
                        <p class="text-xs text-gray-400 mt-1">MOQ: ${p.moq || 'N/A'}</p>
                    </div>`;
                } else if (type === 'video') {
                    const videoId = p.yt_url?.split('v=')[1]?.split('&')[0] || p.yt_url?.split('/').pop();
                    return `<div class="group relative cursor-pointer overflow-hidden rounded-xl bg-black" onclick="openModal('video', ${p.id})">
                        <div class="aspect-video relative"><img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg" class="w-full h-full object-cover opacity-70"><div class="absolute inset-0 flex items-center justify-center"><div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl">▶</div></div></div>
                        <div class="p-3 bg-slate-900 text-white text-xs font-bold truncate">${p.name}</div>
                    </div>`;
                } else if (type === '3d') {
                    return `<div class="bg-white border border-gray-100 rounded-xl overflow-hidden model-card shadow-sm">
                        <model-viewer src="${fixUrl(p.file_path)}" auto-rotate camera-controls interaction-prompt="none"></model-viewer>
                        <div class="p-3 text-center border-t">
                            <h3 class="font-bold text-xs mb-2 truncate">${p.name}</h3>
                            <button onclick="openModal('3d', ${p.id})" class="w-full py-2 text-[10px] font-black bg-blue-600 text-white rounded-lg uppercase">View 3D</button>
                        </div>
                    </div>`;
                }
            }).join('');
        }

        function openModal(type, id, isDeepLink = false) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            
            // 核心修改：打开弹窗时更新 URL，增加 !ID
            if (!isDeepLink) {
                window.location.hash = `${currentPage}!${id}`;
            }

            const modal = document.getElementById('media-modal');
            const img = document.getElementById('modal-img');
            const yt = document.getElementById('youtube-frame');
            const container3d = document.getElementById('modal-3d-container');
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-desc').innerText = `Material: ${p.material || 'Standard'} | MOQ: ${p.moq || 'N/A'}`;
            modal.classList.remove('hidden');
            [img, yt, container3d].forEach(el => el.classList.add('hidden'));
            
            if(type === 'video' && p.yt_url) {
                const videoId = p.yt_url.split('v=')[1]?.split('&')[0] || p.yt_url.split('/').pop();
                yt.classList.remove('hidden');
                yt.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            } else if (type === '3d') {
                container3d.classList.remove('hidden');
                container3d.innerHTML = `<model-viewer src="${fixUrl(p.file_path)}" camera-controls auto-rotate style="width:100%; height:100%"></model-viewer>`;
            } else {
                img.classList.remove('hidden');
                img.src = fixUrl(p.file_path);
            }
        }

        function closeModal() {
            document.getElementById('media-modal').classList.add('hidden');
            document.getElementById('youtube-frame').src = "";
            document.getElementById('modal-3d-container').innerHTML = "";
            
            // 核心修改：关闭弹窗后，网址恢复成单纯的页面路径
            window.location.hash = currentPage;
        }

        init();
    </script>
</body>
</html>
