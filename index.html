<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MFM TEAM | SAGE A+ Supplier</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/nssG1495/web.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .model-card model-viewer {
            width: 100%;
            height: 180px;
            --poster-color: transparent;
            background-color: #f8fafc;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .sidebar-item.active { background-color: #2563eb; color: white; }
        /* 优化：弹窗内容高度调整 */
        #modal-content { max-height: 95vh; }
        img { transition: opacity 0.3s; }
        /* 【保持原样】：仅对带有 lazy 属性的产品图片进行加载状态遮罩，不干扰系统 Logo */
        img[loading="lazy"] { opacity: 0; }
        img.loaded { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-center items-center shadow-lg relative">
        <div class="absolute left-4 md:left-10 flex items-center h-full top-0 cursor-pointer" onclick="showPage('home')">
            <img id="nav-logo" src="https://i.ibb.co/8gdvt8Bq/web.png" alt="Logo" class="h-11 md:h-14 w-auto object-contain transition-opacity duration-300">
        </div>
        
        <div class="flex gap-4 md:gap-8 overflow-x-auto whitespace-nowrap px-4 pl-16 md:pl-0">
            <button onclick="showPage('home')" class="hover:text-blue-400 font-medium transition">Home</button>
            <button onclick="showPage('hot-sales')" class="hover:text-blue-400 font-medium transition">Hot Sales</button>
            <button onclick="showPage('videos')" class="hover:text-blue-400 font-medium transition">Videos</button>
            <button onclick="showPage('3d-view')" class="hover:text-blue-400 font-medium transition">3D Showroom</button>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="h-[60vh] flex flex-col justify-center items-center bg-gradient-to-br from-indigo-900 via-blue-800 to-blue-600 text-white text-center px-4">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 italic tracking-tight">MFM TEAM</h1>
            <p class="text-lg md:text-xl opacity-90 max-w-2xl">Premium SAGE A+ Supplier. Professional Custom Solutions for US Distributors.</p>
            <button onclick="showPage('hot-sales')" class="mt-8 bg-white text-blue-900 px-8 py-3 rounded-full font-bold hover:bg-blue-50 transition shadow-lg">View Our Catalog</button>
        </div>
    </div>

    <div id="main-content" class="max-w-[1920px] mx-auto py-12 px-4 md:px-10">
        <div class="flex flex-col md:flex-row gap-8">
            <aside id="category-sidebar" class="w-full md:w-64 flex-shrink-0 hidden">
                <div class="sticky top-24">
                    <h3 class="font-bold text-slate-900 mb-4 pb-2 border-b uppercase text-xs tracking-widest">Categories</h3>
                    <div id="tag-list" class="flex flex-wrap md:flex-col gap-1">
                        <button onclick="filterByTag('All')" class="sidebar-item active px-3 py-2 rounded-lg text-left text-sm font-medium hover:bg-gray-100 transition">All Items</button>
                    </div>
                </div>
            </aside>

            <div class="flex-1">
                <div id="hot-sales" class="page">
                    <div class="flex justify-between items-center mb-8 border-b pb-4">
                        <h2 class="text-3xl font-bold">Hot Sales</h2>
                        <input type="text" oninput="searchItems(this.value)" placeholder="Search..." class="px-4 py-2 border rounded-full text-sm">
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="product-list"></div>
                    <div id="hot-sales-pagination" class="mt-10 flex flex-wrap items-center justify-center gap-4 text-sm hidden"></div>
                </div>
                
                <div id="videos" class="page">
                    <div class="flex justify-between items-center mb-8 border-b pb-4">
                        <h2 class="text-3xl font-bold">Videos</h2>
                        <input type="text" oninput="searchItems(this.value)" placeholder="Search..." class="px-4 py-2 border rounded-full text-sm">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-8" id="video-list"></div>
                    <div id="videos-pagination" class="mt-10 flex flex-wrap items-center justify-center gap-4 text-sm hidden"></div>
                </div>

                <div id="3d-view" class="page">
                    <div class="flex justify-between items-center mb-8 border-b pb-4">
                        <h2 class="text-3xl font-bold">3D Showroom</h2>
                        <input type="text" oninput="searchItems(this.value)" placeholder="Search..." class="px-4 py-2 border rounded-full text-sm">
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="3d-list"></div>
                    <div id="3d-view-pagination" class="mt-10 flex flex-wrap items-center justify-center gap-4 text-sm hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="media-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[60] hidden flex items-center justify-center p-2 md:p-6">
        <button onclick="closeModal()" class="absolute top-4 right-4 z-[70] text-white text-3xl md:text-5xl hover:text-gray-300">&times;</button>
        
        <div id="modal-content" class="w-full max-w-6xl max-h-full flex flex-col items-center overflow-y-auto">
            <div class="w-full aspect-[16/10] md:aspect-video bg-gray-900 rounded-xl flex items-center justify-center overflow-hidden relative shadow-2xl flex-shrink-1">
                <iframe id="youtube-frame" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen class="hidden"></iframe>
                
                <button id="prevBtn" onclick="moveImg(-1)" class="absolute left-0 h-full px-6 text-white/50 text-5xl z-10 hidden hover:text-white hover:bg-black/20 transition-all duration-300">❮</button>
                <img id="modal-img" src="" class="max-h-full max-w-full object-contain hidden">
                <button id="nextBtn" onclick="moveImg(1)" class="absolute right-0 h-full px-6 text-white/50 text-5xl z-10 hidden hover:text-white hover:bg-black/20 transition-all duration-300">❯</button>
                
                <div id="modal-3d-container" class="hidden w-full h-full"></div>
                <div id="thumb-bar" class="absolute bottom-4 flex gap-2 hidden"></div>
            </div>

            <div class="py-6 md:py-10 text-white text-center w-full px-4 shrink-0">
                <h2 id="modal-title" class="text-2xl md:text-4xl font-bold"></h2>
                <p id="modal-desc" class="opacity-70 mt-2 md:mt-4 text-sm md:text-lg"></p>
                
                <p id="modal-custom-desc" class="mt-4 max-w-3xl mx-auto text-sm text-gray-300 hidden text-center whitespace-pre-wrap leading-relaxed opacity-90"></p>

                <div class="mt-6 md:mt-10 flex flex-wrap justify-center gap-3 md:gap-4 pb-6">
                    <button id="inquiry-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 md:px-12 py-3 md:py-5 rounded-full font-black uppercase tracking-widest transition shadow-xl text-sm md:text-base">Inquiry</button>
                    <button id="whatsapp-btn" class="bg-green-500 hover:bg-green-600 text-white px-8 md:px-12 py-3 md:py-5 rounded-full font-black uppercase tracking-widest transition shadow-xl text-sm md:text-base">WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://mamba-api.mfgift.workers.dev/api/products';
        let allProducts = [], currentImgs = [], currentIndex = 0;
        let currentTag = 'All', currentSearch = '', currentPage = 'home';

        // 针对每个功能页面的独立当前页码记录
        const pageStates = { 'hot-sales': 1, 'videos': 1, '3d-view': 1 };

        const CATEGORIES = ["Apparel", "Bags", "Trade Show", "Caps", "Outdoor & Leisure", "Technology", "Mugs & Drinkware", "Bar", "Automotive", "Home & Kitchen", "Wellness & Health", "Sports", "Offices & Desks", "Jewelry & Giveaways", "Toys & Fun"];

        function fixUrl(path) {
            if (!path) return '';
            return path.startsWith('http') ? path : `https://cdn.jsdelivr.net/gh/CGhaha/eddie@main/${path.replace(/^\//, '')}`;
        }

        async function init() {
            try {
                const res = await fetch(API);
                let data = await res.json();
                
                allProducts = data.sort((a, b) => {
                    const clicksA = parseInt(a.clicks) || 0;
                    const clicksB = parseInt(b.clicks) || 0;
                    if (clicksB !== clicksA) {
                        return clicksB - clicksA;
                    }
                    return b.id - a.id;
                });

                renderTags();
                handleDeepLink();
                setupButtons();
            } catch (e) { console.error(e); }
        }

        function handleDeepLink() {
            const fullHash = window.location.hash.replace('#', '');
            const [pageId, productId] = fullHash.split('!');
            if (pageId && ['home', 'hot-sales', 'videos', '3d-view'].includes(pageId)) showPage(pageId);
            else renderAll();
            if (productId) {
                const p = allProducts.find(x => x.id == productId);
                if (p) openModal(p.category === 'videos' ? 'video' : (p.category === 'showroom-3d' ? '3d' : 'img'), p.id, true);
            }
        }

        window.addEventListener('hashchange', handleDeepLink);

        function setupButtons() {
            document.getElementById('inquiry-btn').onclick = () => {
                const title = document.getElementById('modal-title').innerText;
                const subject = encodeURIComponent(`Quote for ${title}`);
                const body = encodeURIComponent(`Hi All, I am very interested in the ${title} product on your website. Can you please provide more information about it?`);
                window.location.href = `mailto:zhanglonghaha001@gmail.com?subject=${subject}&body=${body}`;
            };
            
            document.getElementById('whatsapp-btn').onclick = () => {
                const title = document.getElementById('modal-title').innerText;
                const text = encodeURIComponent(`Hi All, I am very interested in the ${title} product on your website. Can you please provide more information about it?`);
                window.open(`https://wa.me/8613323604265?text=${text}`, '_blank');
            };
        }

        function renderTags() {
            const tagContainer = document.getElementById('tag-list');
            if(!tagContainer) return;
            tagContainer.innerHTML = `<button onclick="filterByTag('All')" class="sidebar-item active px-3 py-2 rounded-lg text-left text-sm font-medium hover:bg-gray-100 transition">All Items</button>` + 
                CATEGORIES.map(cat => `<button onclick="filterByTag('${cat}')" class="sidebar-item px-3 py-2 rounded-lg text-left text-sm font-medium hover:bg-gray-100 transition">${cat}</button>`).join('');
        }

        function showPage(id) {
            currentPage = id;
            if (document.getElementById('media-modal').classList.contains('hidden')) window.location.hash = id;
            document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === id));
            document.getElementById('category-sidebar').style.display = (id === 'home') ? 'none' : 'block';
            
            // 切换页面或标签时，把当前大页面的页码重置为第1页
            if(pageStates[id]) pageStates[id] = 1;
            
            renderAll();
        }

        function filterByTag(tag) {
            currentTag = tag;
            document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.toggle('active', btn.innerText === tag || (tag === 'All' && btn.innerText === 'All Items')));
            
            // 切换标签分类时，重置当前页面码为第一页
            if(pageStates[currentPage]) pageStates[currentPage] = 1;
            
            renderAll();
        }

        function searchItems(val) { 
            currentSearch = val.toLowerCase(); 
            // 搜索时，重置当前页面码为第一页
            if(pageStates[currentPage]) pageStates[currentPage] = 1;
            renderAll(); 
        }

        function renderAll() {
            if(currentPage === 'home') return;
            let items = allProducts.filter(p => 
                (currentPage === 'hot-sales' && p.category === 'hot-sales') ||
                (currentPage === 'videos' && p.category === 'videos') ||
                (currentPage === '3d-view' && p.category === 'showroom-3d')
            );
            if (currentTag !== 'All') items = items.filter(p => p.tags && p.tags.includes(currentTag));
            if (currentSearch) items = items.filter(p => p.name.toLowerCase().includes(currentSearch));

            // 【核心计算】：依据 3 行的排版逻辑，动态确定每页显示的总个数
            let itemsPerPage = 12; // 默认备用值
            if (currentPage === 'hot-sales' || currentPage === '3d-view') {
                itemsPerPage = window.innerWidth >= 1024 ? 18 : (window.innerWidth >= 768 ? 12 : 6); 
            } else if (currentPage === 'videos') {
                itemsPerPage = window.innerWidth >= 1024 ? 15 : (window.innerWidth >= 768 ? 9 : 3);
            }

            const totalItems = items.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            
            // 安全边界校验
            if (pageStates[currentPage] > totalPages) pageStates[currentPage] = totalPages;
            if (pageStates[currentPage] < 1) pageStates[currentPage] = 1;

            const startIndex = (pageStates[currentPage] - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = items.slice(startIndex, endIndex);

            const containerId = currentPage === 'hot-sales' ? 'product-list' : (currentPage === 'videos' ? 'video-list' : '3d-list');
            renderGrid(containerId, paginatedItems, currentPage === 'hot-sales' ? 'img' : (currentPage === 'videos' ? 'video' : '3d'));

            // 渲染与之对应的底部分页控制器
            renderPaginationControls(currentPage, totalPages);
        }

        // 构建带前后3页数字及直跳页码输入框的分页器HTML
        function renderPaginationControls(pageId, totalPages) {
            const container = document.getElementById(`${pageId}-pagination`);
            if (!container) return;

            if (totalPages <= 1) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            const curr = pageStates[pageId];
            let html = `<div class="flex items-center gap-2">`;

            // 上一页按钮
            if (curr > 1) {
                html += `<button onclick="changePage('${pageId}', ${curr - 1})" class="px-3 py-1.5 border rounded-lg bg-white text-gray-700 hover:bg-gray-50 transition font-medium">Prev</button>`;
            } else {
                html += `<button class="px-3 py-1.5 border rounded-lg bg-gray-100 text-gray-400 cursor-not-allowed font-medium" disabled>Prev</button>`;
            }

            // 计算显示的前后 3 页范围
            const startNum = Math.max(1, curr - 3);
            const endNum = Math.min(totalPages, curr + 3);

            for (let i = startNum; i <= endNum; i++) {
                if (i === curr) {
                    html += `<button class="w-9 h-9 font-bold bg-blue-600 text-white rounded-lg shadow-sm">${i}</button>`;
                } else {
                    html += `<button onclick="changePage('${pageId}', ${i})" class="w-9 h-9 border bg-white text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium">${i}</button>`;
                }
            }

            // 下一页按钮
            if (curr < totalPages) {
                html += `<button onclick="changePage('${pageId}', ${curr + 1})" class="px-3 py-1.5 border rounded-lg bg-white text-gray-700 hover:bg-gray-50 transition font-medium">Next</button>`;
            } else {
                html += `<button class="px-3 py-1.5 border rounded-lg bg-gray-100 text-gray-400 cursor-not-allowed font-medium" disabled>Next</button>`;
            }

            html += `</div>`;

            // 直接输入框快捷跳转结构
            html += `
                <div class="flex items-center gap-2 text-gray-500">
                    <span>Page</span>
                    <input type="number" id="${pageId}-jump-input" min="1" max="${totalPages}" value="${curr}" class="w-14 px-2 py-1 text-center border rounded-lg text-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                    <span>of ${totalPages}</span>
                    <button onclick="jumpToPage('${pageId}', ${totalPages})" class="px-3 py-1 bg-gray-800 text-white rounded-lg hover:bg-gray-700 transition text-xs font-semibold uppercase tracking-wider">Go</button>
                </div>
            `;

            container.innerHTML = html;
        }

        // 点击数字、左右页码切换控制
        function changePage(pageId, targetPage) {
            pageStates[pageId] = targetPage;
            renderAll();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 支持直接输入页码快捷直跳
        function jumpToPage(pageId, maxPage) {
            const input = document.getElementById(`${pageId}-jump-input`);
            if(!input) return;
            let val = parseInt(input.value);
            if (isNaN(val) || val < 1) val = 1;
            if (val > maxPage) val = maxPage;
            
            pageStates[pageId] = val;
            renderAll();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function getYTId(url) {
            if (!url) return '';
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function renderGrid(containerId, items, type) {
            const grid = document.getElementById(containerId);
            if (!grid) return;
            grid.innerHTML = items.map(p => {
                if (type === 'img') {
                    const firstImg = p.file_path ? p.file_path.split(',')[0] : '';
                    return `<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 cursor-pointer group" onclick="openModal('img', ${p.id})">
                        <div class="aspect-square mb-3 overflow-hidden flex items-center justify-center">
                            <img src="${fixUrl(firstImg)}" class="w-full h-full object-contain group-hover:scale-105 transition" loading="lazy" decoding="async" onload="this.classList.add('loaded')">
                        </div>
                        <h3 class="font-bold text-gray-900 truncate text-sm">${p.name}</h3>
                        <p class="text-xs text-gray-400 mt-1">MOQ: ${p.moq || 'N/A'}</p>
                    </div>`;
                } else if (type === 'video') {
                    const vid = getYTId(p.yt_url);
                    const thumb = vid ? `https://i3.ytimg.com/vi/${vid}/hqdefault.jpg` : 'https://placehold.co/600x400?text=No+Video';
                    return `<div class="group relative cursor-pointer overflow-hidden rounded-xl bg-black" onclick="openModal('video', ${p.id})">
                        <div class="aspect-video relative">
                            <img src="${thumb}" class="w-full h-full object-cover opacity-70 group-hover:scale-105 transition duration-500" loading="lazy" decoding="async" onload="this.classList.add('loaded')">
                            <div class="absolute inset-0 flex items-center justify-center"><div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl">▶</div></div>
                        </div>
                        <div class="p-3 bg-slate-900 text-white text-xs font-bold truncate">${p.name}</div>
                    </div>`;
                } else if (type === '3d') {
                    return `<div class="bg-white border border-gray-100 rounded-xl overflow-hidden model-card shadow-sm">
                        <model-viewer src="${fixUrl(p.file_path)}" auto-rotate camera-controls loading="lazy" decoding="async"></model-viewer>
                        <div class="p-3 text-center border-t">
                            <h3 class="font-bold text-xs mb-2 truncate">${p.name}</h3>
                            <button onclick="openModal('3d', ${p.id})" class="w-full py-2 text-[10px] font-black bg-blue-600 text-white rounded-lg uppercase">View 3D</button>
                        </div>
                    </div>`;
                }
            }).join('');
        }

        function openModal(type, id, isDeepLink = false) {
            const p = allProducts.find(x => x.id === id); if(!p) return;
            if (!isDeepLink) window.location.hash = `${currentPage}!${id}`;
            const modal = document.getElementById('media-modal'), img = document.getElementById('modal-img'), yt = document.getElementById('youtube-frame'), container3d = document.getElementById('modal-3d-container');
            const thumbs = document.getElementById('thumb-bar'), pBtn = document.getElementById('prevBtn'), nBtn = document.getElementById('nextBtn');
            
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-desc').innerText = `Material: ${p.material || 'Standard'} | MOQ: ${p.moq || 'N/A'}`;
            
            const customDescEl = document.getElementById('modal-custom-desc');
            if (p.description && p.description.trim() !== "") {
                customDescEl.innerText = p.description;
                customDescEl.classList.remove('hidden');
            } else {
                customDescEl.innerText = "";
                customDescEl.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            [img, yt, container3d, thumbs, pBtn, nBtn].forEach(el => el.classList.add('hidden'));
            
            if(type === 'video' && p.yt_url) {
                const vid = getYTId(p.yt_url);
                yt.classList.remove('hidden'); yt.src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            } else if (type === '3d') {
                container3d.classList.remove('hidden');
                container3d.innerHTML = `<model-viewer src="${fixUrl(p.file_path)}" camera-controls auto-rotate style="width:100%; height:100%"></model-viewer>`;
            } else {
                img.classList.remove('hidden');
                currentImgs = p.file_path ? p.file_path.split(',') : []; currentIndex = 0;
                img.src = fixUrl(currentImgs[0]);
                if(currentImgs.length > 1) { [thumbs, pBtn, nBtn].forEach(el => el.classList.remove('hidden')); renderThumbs(); }
            }
        }

        function moveImg(dir) {
            currentIndex = (currentIndex + dir + currentImgs.length) % currentImgs.length;
            document.getElementById('modal-img').src = fixUrl(currentImgs[currentIndex]);
            renderThumbs();
        }

        function renderThumbs() {
            document.getElementById('thumb-bar').innerHTML = currentImgs.map((src, i) => `
                <div onclick="currentIndex=${i};moveImg(0)" class="w-2 h-2 rounded-full cursor-pointer transition-all ${i===currentIndex?'bg-white scale-125 shadow-lg':'bg-white/30'}"></div>
            `).join('');
        }

        function closeModal() {
            document.getElementById('media-modal').classList.add('hidden');
            document.getElementById('youtube-frame').src = "";
            document.getElementById('modal-3d-container').innerHTML = "";
            window.location.hash = currentPage;
        }

        init();
    </script>
</body>
</html>
