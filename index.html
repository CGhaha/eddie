<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MFM TEAM | SAGE A+ Supplier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        /* 3D/图片卡片基础比例 1.1:1 */
        .model-card {
            display: flex;
            flex-direction: column;
            aspect-ratio: 1.1 / 1; 
        }
        .model-card model-viewer {
            flex-grow: 1;
            width: 100%;
            --poster-color: transparent;
            background-color: #f8fafc;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .sidebar { width: 200px; flex-shrink: 0; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; margin-bottom: 1.5rem; }
            .content-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-center gap-4 md:gap-8 shadow-lg overflow-x-auto whitespace-nowrap">
        <button onclick="showPage('home')" class="hover:text-blue-400 font-medium transition">Home</button>
        <button onclick="showPage('hot-sales')" class="hover:text-blue-400 font-medium transition">Hot Sales</button>
        <button onclick="showPage('videos')" class="hover:text-blue-400 font-medium transition">Videos</button>
        <button onclick="showPage('3d-view')" class="hover:text-blue-400 font-medium transition">3D Showroom</button>
    </nav>

    <div id="home" class="page active">
        <div class="h-[60vh] flex flex-col justify-center items-center bg-gradient-to-br from-indigo-900 via-blue-800 to-blue-600 text-white text-center px-4">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 italic tracking-tight">MFM TEAM</h1>
            <p class="text-lg md:text-xl opacity-90 max-w-2xl">Premium SAGE A+ Supplier. Professional Custom Solutions for US Distributors.</p>
            <button onclick="showPage('hot-sales')" class="mt-8 bg-white text-blue-900 px-8 py-3 rounded-full font-bold hover:bg-blue-50 transition shadow-lg">View Our Catalog</button>
        </div>
    </div>

    <div id="hot-sales" class="page"></div>
    <div id="videos" class="page"></div>
    <div id="3d-view" class="page"></div>

    <div id="media-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-center justify-center p-4">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-white text-4xl hover:text-gray-300">&times;</button>
        <div id="modal-content" class="w-full max-w-5xl flex flex-col items-center">
            <div class="w-full aspect-video bg-gray-800 rounded-xl flex items-center justify-center overflow-hidden relative shadow-2xl">
                <iframe id="youtube-frame" width="100%" height="100%" src="" frameborder="0" allowfullscreen class="hidden"></iframe>
                <img id="modal-img" src="" class="max-h-full hidden">
                <div id="modal-3d-container" class="hidden w-full h-full"></div>
            </div>
            <div class="mt-6 text-white text-center w-full px-4">
                <h2 id="modal-title" class="text-2xl font-bold"></h2>
                <div id="modal-details" class="opacity-70 mt-2 text-sm space-y-1"></div>
                <div class="mt-8 flex flex-wrap justify-center gap-4">
                    <button id="inquiry-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-black uppercase tracking-widest transition shadow-xl px-6 py-2">Inquiry</button>
                    <button id="whatsapp-btn" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-full font-black uppercase tracking-widest transition shadow-xl px-6 py-2">WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://mamba-api.mfgift.workers.dev/api/products';
        let allProducts = [];

        function fixUrl(path) {
            if (!path) return '';
            return path.startsWith('http') ? path : `https://cdn.jsdelivr.net/gh/CGhaha/eddie@main/${path.replace(/^\//, '')}`;
        }

        async function init() {
            try {
                const res = await fetch(API);
                allProducts = await res.json();
                renderPageStructure('hot-sales', 'Hot Sales', 'img');
                renderPageStructure('videos', 'Product Videos', 'video');
                renderPageStructure('3d-view', '3D Showroom', '3d');
            } catch (e) { console.error(e); }
        }

        function renderPageStructure(pageId, title, type) {
            const container = document.getElementById(pageId);
            const gridClass = 'grid-cols-2 md:grid-cols-3 lg:grid-cols-5';
            
            container.innerHTML = `
                <div class="w-full py-12 px-4">
                    <div class="flex justify-between items-center mb-8 border-b pb-4">
                        <h2 class="text-3xl font-bold">${title}</h2>
                        <div class="relative w-48 md:w-64">
                            <input type="text" id="search-${pageId}" oninput="runFilter('${pageId}', '${type}')" placeholder="Search Name..." class="w-full px-4 py-2 border rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="flex content-wrapper gap-8">
                        <div class="sidebar bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                            <h3 class="font-bold mb-4 text-gray-900 uppercase text-xs tracking-wider">Categories</h3>
                            <div class="space-y-3" id="filters-${pageId}">
                                ${['Apparel', 'Drinkware', 'Bags', 'Office', 'Tech', 'Wellness', 'Fun', 'Pet'].map(c => `
                                    <label class="flex items-center gap-3 cursor-pointer group">
                                        <input type="checkbox" value="${c}" onchange="runFilter('${pageId}', '${type}')" class="w-4 h-4 rounded border-gray-300 text-blue-600">
                                        <span class="text-sm text-gray-600 group-hover:text-blue-600">${c}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex-1 grid gap-6 ${gridClass}" id="list-${pageId}"></div>
                    </div>
                </div>
            `;
            runFilter(pageId, type);
        }

        function runFilter(pageId, type) {
            const keyword = document.getElementById(`search-${pageId}`).value.toLowerCase();
            const checkedBoxes = Array.from(document.querySelectorAll(`#filters-${pageId} input:checked`)).map(cb => cb.value.toLowerCase());
            
            const filtered = allProducts.filter(p => {
                const cat = p.category.toLowerCase();
                const isPage = (pageId==='hot-sales' && (cat.includes('hot sales') || cat === 'hot-sales')) || 
                               (pageId==='videos' && cat.includes('videos')) || 
                               (pageId==='3d-view' && (cat.includes('3d') || cat.includes('showroom')));
                const nameMatch = p.name.toLowerCase().includes(keyword);
                const catMatch = checkedBoxes.length === 0 || checkedBoxes.some(c => cat.includes(c));
                return isPage && nameMatch && catMatch;
            });
            
            const grid = document.getElementById(`list-${pageId}`);
            grid.innerHTML = filtered.map(p => {
                if (type === 'img') return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-2 cursor-pointer group flex flex-col" style="aspect-ratio: 1.1 / 1" onclick="openModal('img', ${p.id})">
                        <div class="flex-1 rounded-lg mb-2 overflow-hidden flex items-center justify-center"><img src="${fixUrl(p.file_path)}" class="w-full h-full object-contain group-hover:scale-105 transition"></div>
                        <h3 class="font-bold text-gray-900 truncate text-[11px] px-1">${p.name}</h3>
                        <p class="text-[9px] text-gray-400 mt-0.5 px-1 mb-1">MOQ: ${p.moq || 'N/A'}</p>
                    </div>`;
                if (type === 'video') {
                    const vId = p.yt_url?.split('v=')[1]?.split('&')[0] || p.yt_url?.split('/').pop();
                    return `<div class="group cursor-pointer overflow-hidden rounded-xl bg-white border border-gray-100 shadow-sm flex flex-col" style="aspect-ratio: 4 / 3" onclick="openModal('video', ${p.id})">
                        <div class="bg-black relative overflow-hidden" style="aspect-ratio: 1.7 / 1">
                            <!-- 修改点：使用 object-cover 并填充满左右，无留白 -->
                            <img src="https://img.youtube.com/vi/${vId}/hqdefault.jpg" class="w-full h-full object-cover group-hover:scale-105 transition">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                                    <div class="w-0 h-0 border-t-[6px] border-t-transparent border-l-[10px] border-l-white border-b-[6px] border-b-transparent ml-1"></div>
                                </div>
                            </div>
                        </div>
                        <!-- 修改点：外面只显示名称，材质和MOQ隐藏 -->
                        <div class="flex-1 p-2 bg-slate-900 text-white flex flex-col justify-center">
                            <h3 class="font-bold text-[11px] text-center px-1 break-words line-clamp-2">${p.name}</h3>
                        </div>
                    </div>`;
                }
                return `
                    <div class="bg-white border border-gray-100 rounded-xl overflow-hidden model-card shadow-sm">
                        <model-viewer src="${fixUrl(p.file_path)}" auto-rotate camera-controls interaction-prompt="none"></model-viewer>
                        <div class="p-2 text-center border-t border-gray-50 bg-white">
                            <h3 class="font-bold text-[11px] truncate mb-1.5 text-gray-800">${p.name}</h3>
                            <button onclick="openModal('3d', ${p.id})" class="w-full py-1.5 text-[10px] font-black bg-blue-600 text-white rounded-md uppercase">View 3D</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function openModal(type, id) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            const modal = document.getElementById('media-modal');
            modal.classList.remove('hidden');
            document.getElementById('modal-title').innerText = p.name;
            
            // 修改点：在详情弹窗中显示材质和MOQ
            const detailsHtml = `
                <p>Material: ${p.material || 'N/A'}</p>
                <p>MOQ: ${p.moq || 'N/A'}</p>
            `;
            document.getElementById('modal-details').innerHTML = detailsHtml;

            const img = document.getElementById('modal-img'), yt = document.getElementById('youtube-frame'), c3d = document.getElementById('modal-3d-container');
            [img, yt, c3d].forEach(el => el.classList.add('hidden'));
            if(type === 'video') { yt.classList.remove('hidden'); yt.src = `https://www.youtube.com/embed/${p.yt_url.split('v=')[1] || p.yt_url.split('/').pop()}?autoplay=1`; }
            else if(type === '3d') { c3d.classList.remove('hidden'); c3d.innerHTML = `<model-viewer src="${fixUrl(p.file_path)}" camera-controls auto-rotate style="width:100%;height:100%"></model-viewer>`; }
            else { img.classList.remove('hidden'); img.src = fixUrl(p.file_path); }
            document.getElementById('inquiry-btn').onclick = () => window.location.href = `mailto:zhanglonghaha001@gmail.com?subject=Inquiry:${p.name}`;
            document.getElementById('whatsapp-btn').onclick = () => window.open(`https://wa.me/8613323604265?text=I am interested in ${p.name}`, '_blank');
        }

        function closeModal() { document.getElementById('media-modal').classList.add('hidden'); document.getElementById('youtube-frame').src = ""; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }

        init();
    </script>
</body>
</html>
