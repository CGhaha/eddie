<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mamba Promo | SAGE A+ Supplier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        /* 优化 3D 模型卡片的显示 */
        .model-card model-viewer {
            width: 100%;
            height: 180px;
            --poster-color: transparent;
            background-color: #f8fafc;
        }
        /* 隐藏滚动条但保留滚动功能 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-center gap-4 md:gap-8 shadow-lg overflow-x-auto whitespace-nowrap">
        <button onclick="showPage('home')" class="hover:text-blue-400 font-medium transition">Home</button>
        <button onclick="showPage('hot-sales')" class="hover:text-blue-400 font-medium transition">Hot Sales</button>
        <button onclick="showPage('videos')" class="hover:text-blue-400 font-medium transition">Videos</button>
        <button onclick="showPage('3d-view')" class="hover:text-blue-400 font-medium transition">3D Showroom</button>
    </nav>

    <div id="home" class="page active">
        <div class="h-[60vh] flex flex-col justify-center items-center bg-gradient-to-br from-indigo-900 via-blue-800 to-blue-600 text-white text-center px-4">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 italic tracking-tight">Mamba Promotional Gifts</h1>
            <p class="text-lg md:text-xl opacity-90 max-w-2xl">Premium SAGE A+ Supplier. Professional Custom Solutions for US Distributors.</p>
            <button onclick="showPage('hot-sales')" class="mt-8 bg-white text-blue-900 px-8 py-3 rounded-full font-bold hover:bg-blue-50 transition shadow-lg">View Our Catalog</button>
        </div>
    </div>

    <div id="hot-sales" class="page container mx-auto py-12 px-4">
        <div class="flex justify-between items-end mb-8 border-b pb-4">
            <h2 class="text-3xl font-bold">Hot Sales</h2>
            <span class="text-gray-400 text-sm hidden md:block">Top Trending Items</span>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="product-list"></div>
    </div>

    <div id="videos" class="page container mx-auto py-12 px-4">
        <h2 class="text-3xl font-bold mb-8 border-b pb-4">Product Videos</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8" id="video-list"></div>
    </div>

    <div id="3d-view" class="page container mx-auto py-12 px-4">
        <h2 class="text-3xl font-bold mb-8 border-b pb-4">3D Virtual Showroom</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="3d-list"></div>
    </div>

    <div id="media-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-center justify-center p-4">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-white text-4xl hover:text-gray-300">&times;</button>
        <div id="modal-content" class="w-full max-w-5xl flex flex-col items-center">
            <div class="w-full aspect-video bg-gray-800 rounded-xl flex items-center justify-center overflow-hidden relative shadow-2xl">
                <iframe id="youtube-frame" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen class="hidden"></iframe>
                <img id="modal-img" src="" class="max-h-full hidden">
                <div id="modal-3d-container" class="hidden w-full h-full"></div>
            </div>
            <div class="mt-6 text-white text-center">
                <h2 id="modal-title" class="text-2xl font-bold"></h2>
                <p id="modal-desc" class="opacity-70 mt-2 text-sm"></p>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://mamba-api.mfgift.workers.dev/api/products';
        let allProducts = [];

        function fixUrl(path) {
            if (!path) return '';
            if (path.startsWith('http')) return path;
            const cleanPath = path.replace(/^\//, '');
            return `https://cdn.jsdelivr.net/gh/CGhaha/eddie@main/${cleanPath}`;
        }

        async function init() {
            try {
                const res = await fetch(API);
                allProducts = await res.json();
                renderAll();
            } catch (e) {
                console.error("Data Load Error:", e);
            }
        }

        function renderAll() {
            const productGrid = document.getElementById('product-list');
            const videoGrid = document.getElementById('video-list');
            const threeDGrid = document.getElementById('3d-list');

            // 1. Hot Sales - 修复点：使用 object-contain 确保图片不被裁切
            const hotSales = allProducts.filter(p => p.category.includes('Hot Sales') || p.category === 'hot-sales');
            productGrid.innerHTML = hotSales.map(p => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 cursor-pointer group" onclick="openModal('img', ${p.id})">
                    <div class="aspect-square bg-white rounded-lg mb-3 overflow-hidden flex items-center justify-center">
                        <img src="${fixUrl(p.file_path)}" class="w-full h-full object-contain group-hover:scale-105 transition" loading="lazy">
                    </div>
                    <h3 class="font-bold text-gray-900 truncate text-sm">${p.name}</h3>
                    <p class="text-xs text-gray-400 mt-1">MOQ: ${p.moq || 'N/A'}</p>
                </div>
            `).join('');

            // 2. Videos
            const videos = allProducts.filter(p => p.category.includes('Videos') || p.category === 'videos');
            videoGrid.innerHTML = videos.map(p => {
                const videoId = p.yt_url?.split('v=')[1]?.split('&')[0] || p.yt_url?.split('/').pop();
                return `
                <div class="group relative cursor-pointer overflow-hidden rounded-xl bg-black" onclick="openModal('video', ${p.id})">
                    <div class="aspect-video relative">
                        <img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg" class="w-full h-full object-cover opacity-70">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white">
                                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="p-3 bg-slate-900 text-white text-xs font-bold truncate">${p.name}</div>
                </div>`;
            }).join('');

            // 3. 3D Showroom
            const showroom = allProducts.filter(p => p.category.includes('3D') || p.category === 'showroom-3d');
            threeDGrid.innerHTML = showroom.map(p => `
                <div class="bg-white border border-gray-100 rounded-xl overflow-hidden model-card shadow-sm">
                    <model-viewer src="${fixUrl(p.file_path)}" 
                        auto-rotate camera-controls interaction-prompt="none" 
                        loading="eager" reveal="auto" shadow-intensity="1">
                    </model-viewer>
                    <div class="p-3 text-center border-t border-gray-50">
                        <h3 class="font-bold text-xs mb-2 truncate">${p.name}</h3>
                        <button onclick="openModal('3d', ${p.id})" class="w-full py-2 text-[10px] font-black bg-blue-600 text-white rounded-lg uppercase">View 3D</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(type, id) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;

            const modal = document.getElementById('media-modal');
            const img = document.getElementById('modal-img');
            const yt = document.getElementById('youtube-frame');
            const container3d = document.getElementById('modal-3d-container');
            
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-desc').innerText = `Material: ${p.material || 'Standard'} | MOQ: ${p.moq || 'N/A'}`;
            
            modal.classList.remove('hidden');
            [img, yt, container3d].forEach(el => el.classList.add('hidden'));
            
            if(type === 'video' && p.yt_url) {
                const videoId = p.yt_url.split('v=')[1]?.split('&')[0] || p.yt_url.split('/').pop();
                yt.classList.remove('hidden');
                yt.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            } else if (type === '3d') {
                container3d.classList.remove('hidden');
                container3d.innerHTML = `<model-viewer src="${fixUrl(p.file_path)}" camera-controls auto-rotate shadow-intensity="1" style="width:100%; height:100%" ar></model-viewer>`;
            } else {
                img.classList.remove('hidden');
                img.src = fixUrl(p.file_path);
            }
        }

        function closeModal() {
            document.getElementById('media-modal').classList.add('hidden');
            document.getElementById('youtube-frame').src = "";
            document.getElementById('modal-3d-container').innerHTML = "";
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        init();
    </script>
</body>
</html>
